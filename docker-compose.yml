version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas_app
    working_dir: /var/www
    volumes:
      - ./app:/var/www
    networks:
      - saas_network
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: saas_nginx
    volumes:
      - ./app:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - saas_network
    # ❌ IMPORTANTE: NO exponer puertos aquí (NPM lo maneja)

  db:
    image: mysql:8.0
    container_name: saas_db
    restart: always
    environment:
      MYSQL_DATABASE: saas_main
      MYSQL_ROOT_PASSWORD: Root#Hielitos2026x
      MYSQL_USER: saas
      MYSQL_PASSWORD: Saas#Hielitos2026x
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - saas_network

  redis:
    image: redis:alpine
    container_name: saas_redis
    networks:
      - saas_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas_queue
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - ./app:/var/www
    depends_on:
      - db
      - redis
    networks:
      - saas_network

networks:
  saas_network:
    driver: bridge

volumes:
  dbdata:
